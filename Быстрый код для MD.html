# Задачи SQL
## Тема 1 - Простые выборки и фильтры
### Задача 1.1
Посчитать сумму покупки по каждой позиции заказа с учетом скидки. Вывести таблицу с полями -  номер заказа, код продукта, сумма в чеке (точность до двух знаков после заяпятой)
*Пример вывода*
|order_id |product_id| amount|
|--|--|---|
|10248	|11	|168.00|
|10248	|42	|98.00|
|10248	|72	|174.00|

### Эталонное решение
```	
select	  order_id,
			product_id,
			round(unit_price*quantity-discount,2) as amount
from order_details
order by order_id
```
### Задача 1.2
Вывести общее количество строк (позиций заказов) в таблице `order_details` и количество заказов (уникальные значения поля `order_id`
*Пример вывода*
|total |orders|
|--|--|
|2155	|830	|

### Эталонное решение	
```	
select 	count(order_id) as total,
		   count(distinct order_id) as orders
from order_details
```
### Задача 1.3
Вывести список всех заказчиков из Мадрида. Результат отсортируйте по полю `company_name`
*Пример вывода*
|company_name|country|city|
|--|--|---|
|Bólido Comidas preparadas|Spain|Madrid|
|FISSA Fabrica Inter. Salchichas S.A.|Spain|Madrid|

### Эталонное решение
```
select company_name, country, city
from customer 
where city = 'Madrid'
order by company_name
```

### Задача 1.4
Вывести список всех заказчиков Германии и США. Результат отсортируйте по полям `country`, `city`
*Пример вывода*
|company_name|country|city|
|--|--|---|
|Germany|Aachen|Drachenblut Delikatessen|
|Germany|Berlin|Alfreds Futterkiste|
|Germany|Brandenburg|Königlich Essen|

### Эталонное решение
```
select country, city, company_name  
from customer c
where country = 'Germany' OR c.country = 'USA'
order by country, city
```

## Задача 1.5
Вывести список всех заказов, в которых есть хотя бы одна позиция общей стоимостью (с учетом скидки) больше 5000. Результат осортировать по `номер заказа`
*Пример вывода*
|order_id|
|--|
|10353|
|10372|

### Эталонное решение
```
select 	distinct order_id
from order_details
where (unit_price*quantity-discount) > 5000
order by order_id
```

## Тема 2 - Простые агрегации
### Задача 2.1
Посчитать среднюю стоимость одной позиции в заказе с учетом скидки. Вывести с точностью до трех знаков после запятой.
*Пример вывода*
|avg_sum_pos |
|--|
|628.519|

### Эталонное решение
```
select round(avg(unit_price*quantity-discount),3) as avg_sum_pos
from  order_details
```
### Задача 2.2

Посчитать количествовсех заказов, в которых есть хотя бы одна позиция общей стоимостью (с учетом скидки) больше 5000. 
|cnt_order|
|--|
|19|

### Эталонное решение
```
select 	count(distinct order_id)
from order_details
where (unit_price*quantity-discount) > 5000
```
